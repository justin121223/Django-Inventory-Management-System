{% extends 'partials/base.html' %}
{% block title %}Customer Page{% endblock %}
{% load static %}

{% block content %}
<style>
    /* Fullscreen background */
    body {
        background: url("{% static 'image/paull.jpeg' %}") no-repeat center center fixed;
        background-size: cover;
        background-attachment: fixed;
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
    }

    /* Glass-style card */
    .card-profile {
        background-color: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        border-radius: 15px;
        color: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    /* Table styling */
    .table th, .table td {
        color: white;
    }

    .table thead {
        background-color: rgba(0, 0, 0, 0.3);
    }

    .btn-info {
        background-color: rgba(23, 162, 184, 0.85);
        border: none;
        transition: 0.3s ease-in-out;
    }

    .btn-info:hover {
        opacity: 0.9;
        transform: scale(1.05);
    }

    h4, h5, hr {
        color: white;
    }

    .row {
        padding: 40px;
    }

    .img-thumbnail {
        border-radius: 15px;
    }
</style>

<div class="row my-4">
    <div class="col-md-4"></div>
    <div class="col-md-8">
        <div class="card-profile">
            <div class="card-header bg-info text-white">
                Customer Detail Page
            </div>
            <div class="row p-3">
                <div class="col-md-8">
                    <table class="table table-borderless">
                        <thead>
                            <span class="h4">Profile Information</span>
                            <a class="btn btn-info btn-sm float-right" href="{% url 'user-profile-update' %}">Edit</a>
                            <hr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">Name</th>
                                <td>{{ user.username }}</td>
                            </tr>
                            <tr>
                                <th scope="row">Email</th>
                                <td>{{ user.email }}</td>
                            </tr>
                            <tr>
                                <th scope="row">Phone</th>
                                <td>{{ user.profile.phone }}</td>
                            </tr>
                            <tr>
                                <th scope="row">Address</th>
                                <td>{{ user.profile.address }}</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="col-md-4">
                    <img class="img-thumbnail" src="{{ user.profile.image.url }}" alt="profile-image">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
